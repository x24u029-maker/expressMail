<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        main,
        body {
            margin: 0;
            height: 100dvh;


        }

        body {
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            display: grid;
            grid-template-rows: 10% 70% 20%;
            grid-template-columns: 30% 70%;
            background-color: #111;
        }

        #header {
            grid-row: 1/2;
            grid-column: 1/3;
            display: flex;
            flex-direction: row;
            align-items: center;
            color: #fff;
            background-color: #777;
            margin-bottom: 10px;
            padding-left: 30px;
            gap: 20px;
        }

        .window {
            margin: 5px;
            background-color: #222;
            border: #777 solid 2px;
            border-radius: 20px;
        }

        #pallet {
            grid-row: 2/3;
            grid-column: 1/2;
            padding: 20px;
            min-height: 100px;
            overflow-y: scroll;
            scrollbar-width: none;
            /* Firefox */
            -ms-overflow-style: none;
            /* IE / Edge(旧) */
        }

        #pallet::-webkit-scrollbar {
            display: none;
            /* Chrome / Safari */
        }

        .pallet {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: left;
            gap: 5px;
        }

        .optionTile {
            align-self: flex-end;
        }

        #mapWindow {
            grid-row: 2/3;
            grid-column: 2/3;
            display: grid;
            padding: 10px;
            overflow: hidden;
            align-items: stretch;

        }

        #optionWindow {
            grid-column: 1/3;
            padding: 20px;
            display: flex;
            flex-direction: row;
            justify-content: left;
            gap: 5px;
        }


        #optionWindow input {
            padding: 0;
            border: #fff 2px solid;
            width: 200px;
            height: 90%;
            border-radius: 20px;
            background-color: rgba(128, 128, 128, 0.6);
            font-size: 32px;
            color: #fff;


        }

        #map {
            display: grid;

            overflow: auto;
            color: #fff;
            text-align: center;
        }

        .mapTile {
            border: #fff solid 1px;
            background-size: cover;
            word-wrap: break-word;
        }

        .title {
            padding-left: 5px;
            color: #fff;
            border-bottom: #fff solid 2px;

        }

        .tile {
            width: 50px;
            aspect-ratio: 1/1;
            background-size: cover;
            border: solid #777 2px;
        }

        .optionTile {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #start {
            background-color: aquamarine;
        }

        #goal {
            background-color: #dd9999;
        }

        #erase {
            background-color: #ddd;
        }

        #dead {
            background-color: #811;
        }
    </style>
    <title>Document</title>
</head>

<body>
    <div id="header">
        <h1>mapCreater</h1>
        <p>
            width:<input type="number" id="width">
            height:<input type="number" id="height">
            <input type="button" id="btn" value="go">
        </p>
    </div>
    <div class="window" id="pallet">
        <p class="title">tilePallet</p>
        <div class="pallet" id="tilePallet"></div>
        <p class="title">enemyPallet</p>
        <div class="pallet" id="enemyPallet"></div>
        <p class="title">itemPallet</p>
        <div class="pallet" id="itemPallet"></div>
        <p class="title">optionPallet</p>
        <div class="pallet" id="optionPallet">
            <div class="tile optionTile" id="start">start</div>
            <div class="tile optionTile" id="goal">goal</div>
            <div class="tile optionTile" id="dead">dead</div>
            <div class="tile optionTile" id="erase">erase</div>
        </div>

    </div>
    <div class="window" id="mapWindow">
        <div id="map"></div>
    </div>
    <div class="window" id="optionWindow">
        <input type="button" id="export" value="出力">
        <input type="text" id="importText" value="">
        <input type="button" id="import" value="入力">
        <a href="index.html">実行画面に遷移</a>
    </div>

</body>
<script type="module">
    import { tileImages, enemySampleImages, enemyInfoList, optionTileImages, itemInfo } from "./js/store/dataStore.js";
    const tp = document.getElementById("tilePallet");
    const ep = document.getElementById("enemyPallet");
    const ip = document.getElementById("itemPallet");

    const map = document.getElementById("map");

    const wn = document.getElementById("width");
    const hn = document.getElementById("height");
    const btn = document.getElementById("btn");

    const eraseBtn = document.getElementById("erase");
    const sBtn = document.getElementById("start");
    const gBtn = document.getElementById("goal");
    const dBtn = document.getElementById("dead");

    const exBtn = document.getElementById("export");
    const imBtn = document.getElementById("import");
    const imText = document.getElementById("importText")

    let w = 10;
    let h = 10;

    btn.addEventListener("click", function () {
        w = wn.value;
        h = hn.value;
        setMap(w, h);
    });

    function setMap(w, h) {
        map.innerHTML = "";
        map.style.gridTemplateColumns = `repeat(${w}, 50px)`;
        map.style.gridTemplateRows = `repeat(${h},50px)`;
        for (let i = 0; i < w * h; i++) {
            const tile = document.createElement("div");
            tile.classList.add("mapTile");
            tile.dataset.major = "";
            tile.dataset.minor = "";
            tile.dataset.isObject = "false";
            tile.dataset.objectGenre = "";
            tile.dataset.objectId = "";

            map.appendChild(tile);

            tile.addEventListener("click", function (e) {
                if (selectTileInfo.tileId === null) return;
                if (selectTileInfo.mode === "write") {
                    console.log(selectTileInfo.src);
                    if (selectTileInfo.major === "ground") {
                        e.target.dataset.major = selectTileInfo.major;
                        e.target.dataset.minor = selectTileInfo.tileId;
                        e.target.style.backgroundImage = `url(${selectTileInfo.src})`;
                        if(selectTileInfo.tileId === "barrier"){
                            e.target.innerHTML = "barrier";
                        }
                    } else {
                        e.target.innerHTML = selectTileInfo.tileId;
                        e.target.dataset.isObject = "true";
                        e.target.dataset.objectGenre = selectTileInfo.major;
                        tile.dataset.objectId = selectTileInfo.tileId;
                    }


                } else if (selectTileInfo.mode === "erase") {
                    e.target.style.backgroundImage = "none";
                    e.target.innerHTML = "";
                    e.target.dataset.isObject = "false";
                    e.target.dataset.objectGenre = "";
                    e.target.dataset.objectId = "";
                    e.target.dataset.major = "";
                    e.target.dataset.minor = "";

                }
            })
        }
    }

    setMap(10, 10);

    let selectTileInfo = {
        element: null,
        mode: "write",
        tileId: null,
        major: null,
        src: null
    };



    function setTilePallet() {
        for (const [key, value] of Object.entries(tileImages)) {
            console.log(
                `key: ${key}, src: ${value.src}, class: ${value.class}`
            );
            const tile = document.createElement("div");
            tile.style.backgroundImage = `url(${value.src})`;
            tile.classList.add("tile");
            tp.appendChild(tile);
            if(key === "barrier"){
                tile.innerHTML = "barrier";
            }
            tile.addEventListener("click", function (e) {
                if (selectTileInfo.element) {
                    selectTileInfo.element.style.border = "solid #777 2px";
                }
                selectTileInfo = {
                    element: e.currentTarget,
                    mode: "write",
                    tileId: key,
                    major: "ground",
                    src: value.src
                };
                selectTileInfo.element.style.border = "solid #dd6666 2px";
                console.log(`selectKey:${selectTileInfo.tileId}`);
            })
        }
    }

    function setEnemyPallet() {
        for (const [key, value] of Object.entries(enemySampleImages)) {
            const tile = document.createElement("div");
            tile.style.backgroundImage = `url(${value.src})`;
            tile.classList.add("tile");
            console.log(key);
            tile.addEventListener("click", function (e) {
                if (selectTileInfo.element) {
                    selectTileInfo.element.style.border = "solid #777 2px";
                }
                selectTileInfo = {
                    element: e.currentTarget,
                    mode: "write",
                    tileId: key,
                    major: "enemy",
                    src: value.src
                };
                selectTileInfo.element.style.border = "solid #dd6666 2px";
                console.log(`selectKey:${selectTileInfo.tileId}`);
            })
            ep.appendChild(tile);
        }
    }

    function setItemPallet() {
        for (const [key, value] of Object.entries(itemInfo)) {
            const tile = document.createElement("div");
            tile.style.backgroundImage = `url(${value.src})`;
            tile.classList.add("tile");
            console.log(key);
            tile.addEventListener("click", function (e) {
                if (selectTileInfo.element) {
                    selectTileInfo.element.style.border = "solid #777 2px";
                }
                selectTileInfo = {
                    element: e.currentTarget,
                    mode: "write",
                    tileId: key,
                    major: "item",
                    src: value.src
                };
                selectTileInfo.element.style.border = "solid #dd6666 2px";
                console.log(`selectKey:${selectTileInfo.tileId}`);
            })
            ip.appendChild(tile);
        }
    }

    eraseBtn.addEventListener("click", function () {
        if (selectTileInfo.element) {
            selectTileInfo.element.style.border = "solid #777 2px";
        }
        selectTileInfo.element = eraseBtn;
        selectTileInfo.element.style.border = "solid #dd6666 2px";
        selectTileInfo.mode = "erase";
        console.log(selectTileInfo.mode);
    })

    sBtn.addEventListener("click", function () {

        if (selectTileInfo.element) {
            selectTileInfo.element.style.border = "solid #777 2px";
        }

        const key = sBtn.id;
        const tile = optionTileImages[key];
        if (!tile) return;

        selectTileInfo = {
            ...selectTileInfo,
            element: sBtn,
            mode: "write",
            tileId: key,
            major: "rule",
            src: tile.src
        };

        selectTileInfo.element.style.border = "solid #dd6666 2px";
    });

    gBtn.addEventListener("click", function () {

        if (selectTileInfo.element) {
            selectTileInfo.element.style.border = "solid #777 2px";
        }

        const key = gBtn.id;
        const tile = optionTileImages[key];
        if (!tile) return;

        selectTileInfo = {
            ...selectTileInfo,
            element: gBtn,
            mode: "write",
            tileId: key,
            major: "rule",
            src: tile.src
        };

        selectTileInfo.element.style.border = "solid #dd6666 2px";
    });

    dBtn.addEventListener("click", function () {

        if (selectTileInfo.element) {
            selectTileInfo.element.style.border = "solid #777 2px";
        }

        const key = dBtn.id;
        const tile = optionTileImages[key];
        if (!tile) return;

        selectTileInfo = {
            ...selectTileInfo,
            element: gBtn,
            mode: "write",
            tileId: key,
            major: "rule",
            src: tile.src
        };

        selectTileInfo.element.style.border = "solid #dd6666 2px";
    });

    exBtn.addEventListener("click", function () {
        let data;
        let obData;
        [data, obData] = buildMapData();
        const text = mapDataToString(data);
        console.log(`[{width:${w},height:${h}}]`);
        console.log(text);
        const obText = obMapDataToString(obData);
        console.log(obText);

    })

    setTilePallet();
    setEnemyPallet();
    setItemPallet();

    function buildMapData() {
  const tiles = document.querySelectorAll("#map .mapTile");
  const result = [];
    const obResult = [];
  for (let y = 0; y < h; y++) {
    result[y] = [];
    for (let x = 0; x < w; x++) {
      const tile = tiles[x + y * w];

      if (tile.dataset.major === "ground" && tile.dataset.minor) {
        result[y][x] = {
          major: "ground",
          minor: tile.dataset.minor
        };
      } else {
        result[y][x] = 0;
      }

      if (tile.dataset.isObject === "true") {
                    obResult.push({ major: tile.dataset.objectGenre, minor: tile.dataset.objectId, y: y, x: x });
                 
                }
    }
  }
  return [result,obResult];

}




    function mapDataToString(mapData) {
        return "[\n" +
            mapData.map(row =>
                "  [" +
                row.map(cell =>
                    cell === 0
                        ? "0"
                        : `{ "major": "${cell.major}", "minor": "${cell.minor}" }`
                ).join(", ") +
                "]"
            ).join(",\n") +
            "\n]";
    }

    function obMapDataToString(obData) {
        return JSON.stringify(obData, null, 2);
    }

    imBtn.addEventListener("click", function () {
        const text = imText.value;
        const mapData = JSON.parse(text); // ← これが必要
        decodeMapData(mapData);
    });


    function decodeMapData(mapData) {
  h = mapData.length;
  w = mapData[0].length;
  setMap(w, h);

  const tiles = document.querySelectorAll("#map .mapTile");

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const cell = mapData[y][x];
      const tile = tiles[x + y * w];

      // 初期化（必須）
      tile.dataset.major = "";
      tile.dataset.minor = "";
      tile.style.backgroundImage = "none";

      if (cell === 0) continue;

      tile.dataset.major = "ground";
      tile.dataset.minor = cell.minor;

      const src = tileImages[cell.minor]?.src;
      if (src) {
        tile.style.backgroundImage = `url(${src})`;
      }
    }
  }
}


    function getTileSrc(major, minor) {
        if (major === "ground") return tileImages[minor]?.src;
        if (major === "enemy") return enemySampleImages[minor]?.src;
        if (major === "rule") return optionTileImages[minor]?.src;
        return null;
    }




</script>

</html>
